<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Harmony Architect PWA</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=12">
    
    <!-- Motore Custom Zero Dependency (Sostituisce Tonal.js) -->
    <!-- WebAudioFontPlayer -->
    <script src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
</head>
<body>
    <div id="app" class="main-scrollable">
        <!-- 1. Header & Level Selection -->
        <header class="panel flex-row justify-between top-frame">
            <div class="flex-row gap-small header-left">
                <span class="label text-bold">Livello:</span>
                <select id="level_select" class="dropdown"></select>
                <!-- Modalità ALWAYS visible (extracted from collapsible) -->
                <select id="play_mode_menu" class="dropdown purple-btn mode-select">
                    <option>Accordo Singolo</option>
                    <option>Progressione</option>
                </select>
            </div>
            
            <div class="flex-row gap-small header-right">
                <!-- Unified progress: ✓3/10 (75%) 🔥2 -->
                <div class="progress-unified" id="progress_unified">
                    <div class="progress-bar"><div id="progress_fill" class="progress-fill" style="width: 0%;"></div></div>
                    <span id="progress_text" class="progress-text">0/10</span>
                    <span id="streak_badge" class="streak-badge" style="display:none;"></span>
                </div>
                <button id="reset_btn" class="btn icon-btn btn-danger" title="Azzera History">🗑️</button>
                <button id="settings_toggle" class="btn mobile-only" title="Settings">MENU ▾</button>
                <button id="next_btn" class="btn btn-primary next-btn">↻ Nuova Sfida</button>
            </div>
        </header>

        <!-- Collapsible Settings (wraps settings + orchestra for mobile) -->
        <div id="settings_collapsible" class="settings-collapsible">
            <!-- Settings Panel -->
            <div class="panel settings-frame settings-grid">
                <span class="label">Voice Leading:</span>
                <select id="voice_leading_menu" class="dropdown">
                    <option>Root Position</option>
                    <option selected>Ottimizzata (Drop-2)</option>
                </select>
                <span class="label">Tempo:</span>
                <select id="tempo_menu" class="dropdown small-btn">
                    <option value="2160">Lento</option>
                    <option value="1560" selected>Medio</option>
                    <option value="960">Veloce</option>
                </select>
                <span class="label">Training:</span>
                <select id="training_menu" class="dropdown orange-btn">
                    <option selected>Standard</option>
                    <option>Adaptive</option>
                </select>
                <span class="label">Sessione:</span>
                <select id="session_size_menu" class="dropdown">
                    <option value="5">5 sfide</option>
                    <option value="10" selected>10 sfide</option>
                    <option value="20">20 sfide</option>
                    <option value="50">50 sfide</option>
                </select>
            </div>

            <!-- Orchestra Row -->
            <div class="panel flex-row flex-wrap instruments-row">
                <span class="label text-cyan" style="margin-right: 15px;">Orchestra:</span>
                <div id="voice_instruments_frame" class="flex-row expand j-around">
                    <!-- Dropdowns will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Play commands -->
        <div class="panel flex-row play-frame">
            <button id="play_btn" class="btn hardware-btn play-btn-fixed">▶ PLAY</button>
            <div id="combo_label" class="combo-text"></div>
            <button id="arpeggio_btn" class="btn hardware-btn alt-hardware-btn play-btn-fixed">ARPEGGIATOR</button>
        </div>

        <!-- Staff and Answers -->
        <div class="middle-frame flex-row flex-wrap">
            <div class="panel staff-frame flex-1 border-thick" style="position: relative;">
                <canvas id="staff_canvas" width="600" height="440" style="display: block;"></canvas>
            </div>
            <div class="answers-frame flex-col">
                <!-- Buttons populated by JS -->
            </div>
        </div>

        <!-- Voice Isolation (Solo) -->
        <div class="panel flex-row flex-wrap solo-frame">
            <span class="label text-muted margin-r solo-label">ISOLATE:</span>
            <div id="solo_buttons_frame" class="flex-row expanded gap-small">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Theory Insight Panel -->
        <div class="panel insight-frame flex-col">
            <div class="flex-row j-around" style="margin-bottom: 8px; font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 6px;">
                <span style="color:#3498db">● Root (1)</span>
                <span style="color:#2ecc71">● Terza (3)</span>
                <span style="color:#f1c40f">● Quinta (5)</span>
                <span style="color:#C26A23">● Settima (7)</span>
                <span style="color:#e74c3c">● Estensioni (9,11,13)</span>
            </div>
            <p id="insight_label" class="font-courier text-muted text-center"></p>
        </div>
    </div>

    <!-- Post-Answer Popup -->
    <div id="next_popup" class="next-popup hidden">
        <div class="next-popup-card">
            <div id="next_popup_icon" class="next-popup-icon"></div>
            <div id="next_popup_msg" class="next-popup-msg"></div>
            <div class="next-popup-actions">
                <button id="next_popup_continue" class="btn btn-primary next-popup-btn">▶ Suona il prossimo</button>
                <button id="next_popup_replay" class="btn next-popup-btn-sec">🔁 Riascolta</button>
                <button id="next_popup_stop" class="btn next-popup-btn-ghost">✕ Interrompi</button>
            </div>
        </div>
    </div>

    <!-- Session Complete Overlay -->
    <div id="session_overlay" class="session-overlay hidden">
        <div class="session-card">
            <div id="session_badge" class="session-badge"></div>
            <h2 id="session_title" class="session-title"></h2>
            <p id="session_detail" class="session-detail"></p>
            <button id="session_restart_btn" class="btn btn-primary session-restart">🔄 Nuova Sessione</button>
        </div>
    </div>

    <!-- Modals Overlay -->
    <div id="modal_overlay" class="modal-overlay hidden">
        <!-- Modals will be injected here -->
    </div>

    <!-- PWA Fullscreen Start Overlay -->
    <div id="start_overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-main);z-index:9999;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;cursor:pointer;flex-direction:column;gap:20px;">
        <span style="font-size: 40px;">🎹</span>
        <span>Tocca per iniziare</span>
    </div>

    <script src="js/audio_engine.js?v=12"></script>
    <script src="js/music_engine.js?v=12"></script>
    <script src="js/gui.js?v=12"></script>
    <script src="js/main.js?v=12"></script>
</body>
</html>
