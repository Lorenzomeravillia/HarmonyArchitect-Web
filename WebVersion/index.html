<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ClearVoicing</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=19">

    <!-- WebAudioFontPlayer (cross-browser, iOS-compatible) -->
    <script src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
</head>
<body>
    <!-- Full-width session progress (fixed, 4px, always visible) -->
    <div id="top_progress_outer">
        <div id="top_progress_fill"></div>
    </div>

    <div id="app" class="main-scrollable">
        <!-- Header -->
        <header class="panel flex-row justify-between top-frame">
            <div class="flex-row gap-small header-left">
                <span class="label text-bold">Level:</span>
                <select id="level_select" class="dropdown"></select>
                <select id="play_mode_menu" class="dropdown purple-btn mode-select">
                    <option>Single Chord</option>
                    <option>Progression</option>
                </select>
            </div>
            <div class="flex-row gap-small header-right">
                <!-- Progress -->
                <div class="progress-unified" id="progress_unified">
                    <div class="progress-bar"><div id="progress_fill" class="progress-fill" style="width:0%;"></div></div>
                    <span id="progress_text" class="progress-text">0/5</span>
                    <span id="streak_badge" class="streak-badge" style="display:none;"></span>
                </div>
                <button id="reset_btn" class="btn icon-btn btn-danger" title="Reset Session">🗑️</button>
                <button id="coach_btn" class="btn icon-btn coach-btn" title="Help tour">?</button>
                <button id="settings_toggle" class="btn settings-toggle-btn">⚙ Settings</button>
                <button id="next_btn" class="btn btn-primary next-btn">↻ New</button>
            </div>
        </header>

        <!-- Timbre presets: always visible, outside collapsible -->
        <div class="panel flex-row flex-wrap instruments-row">
            <span class="label text-cyan timbre-label">Timbre:</span>
            <div id="voice_instruments_frame" class="flex-row flex-wrap timbre-presets"></div>
        </div>

        <!-- Settings: starts closed on all viewports -->
        <div id="settings_collapsible" class="settings-collapsible">
            <div class="panel settings-frame settings-grid">
                <span class="label">Voice Leading:</span>
                <select id="voice_leading_menu" class="dropdown">
                    <option>Root Position</option>
                    <option selected>Optimized (Drop-2)</option>
                </select>
                <span class="label">Tempo:</span>
                <select id="tempo_menu" class="dropdown small-btn">
                    <option value="2160">Slow</option>
                    <option value="1560" selected>Medium</option>
                    <option value="960">Fast</option>
                </select>
                <span class="label">Volume:</span>
                <select id="volume_menu" class="dropdown orange-btn">
                    <option value="0.45">Low</option>
                    <option value="0.70" selected>Medium</option>
                    <option value="1.00">High</option>
                </select>
                <span class="label">Session:</span>
                <select id="session_size_menu" class="dropdown">
                    <option value="3">3 challenges</option>
                    <option value="5" selected>5 challenges</option>
                    <option value="10">10 challenges</option>
                </select>
            </div>
        </div>

        <!-- Play commands -->
        <div class="panel flex-row play-frame">
            <button id="play_btn" class="btn hardware-btn play-btn-fixed">▶ PLAY</button>
            <div id="combo_label" class="combo-text"></div>
            <button id="reveal_btn" class="btn reveal-btn">REVEAL</button>
            <button id="arpeggio_btn" class="btn hardware-btn alt-hardware-btn play-btn-fixed">ARPEGGIATOR</button>
        </div>

        <!-- Interval Legend (above staff — visible before looking at notes) -->
        <div class="panel legend-frame">
            <div class="interval-legend">
                <span class="legend-item"><span class="legend-dot" style="background:#4A90D9;"></span>Root (1)</span>
                <span class="legend-item"><span class="legend-dot" style="background:#2EC4B6;"></span>Third (3)</span>
                <span class="legend-item"><span class="legend-dot" style="background:#F0B429;"></span>Fifth (5)</span>
                <span class="legend-item"><span class="legend-dot" style="background:#E8873D;"></span>Seventh (7)</span>
                <span class="legend-item"><span class="legend-dot" style="background:#D946A8;"></span>Ext (9,11,13)</span>
            </div>
            <p id="insight_label" class="font-courier text-muted text-center"></p>
        </div>

        <!-- Staff and Answers -->
        <div class="middle-frame flex-row flex-wrap">
            <div class="panel staff-frame flex-1 border-thick" style="position: relative;">
                <canvas id="staff_canvas" width="600" height="440" style="display: block;"></canvas>
            </div>
            <div class="answers-frame flex-col">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Voice Isolation (Solo) -->
        <div class="panel flex-row flex-wrap solo-frame">
            <span class="label text-muted margin-r solo-label">SOLO:</span>
            <div id="solo_buttons_frame" class="flex-row expanded gap-small">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <!-- Post-Answer Popup -->
    <div id="next_popup" class="next-popup hidden">
        <div class="next-popup-card">
            <div id="next_popup_icon" class="next-popup-icon"></div>
            <div id="next_popup_msg" class="next-popup-msg"></div>
            <div class="next-popup-actions">
                <button id="next_popup_continue" class="btn btn-primary next-popup-btn">▶ Play Next</button>
                <button id="next_popup_replay" class="btn next-popup-btn-sec">🔁 Replay</button>
                <button id="next_popup_stop" class="btn next-popup-btn-ghost">✕ Stop</button>
            </div>
        </div>
    </div>

    <!-- Session Complete Overlay -->
    <div id="session_overlay" class="session-overlay hidden">
        <div class="session-card">
            <div id="session_badge" class="session-badge"></div>
            <h2 id="session_title" class="session-title"></h2>
            <p id="session_detail" class="session-detail"></p>
            <button id="session_restart_btn" class="btn btn-primary session-restart">🔄 New Session</button>
        </div>
    </div>

    <!-- Modals Overlay -->
    <div id="modal_overlay" class="modal-overlay hidden">
        <!-- Modals will be injected here -->
    </div>

    <!-- Coach Mark Tooltip -->
    <div id="coach_mark" class="coach-mark hidden">
        <div class="coach-arrow coach-arrow-up"></div>
        <p class="coach-text"></p>
    </div>

    <!-- PWA Fullscreen Start Overlay -->
    <div id="start_overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-main);z-index:9999;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;cursor:pointer;flex-direction:column;gap:20px;">
        <span style="font-size:40px;">🎹</span>
        <span>Tap to start</span>
    </div>

    <script src="js/audio_engine.js?v=30"></script>
    <script src="js/music_engine.js?v=30"></script>
    <script src="js/gui.js?v=30"></script>
    <script src="js/coach.js?v=30"></script>
    <script src="js/main.js?v=30"></script>
</body>
</html>
