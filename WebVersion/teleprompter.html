<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearVoicing Action Teleprompter</title>
    <style>
        :root {
            --bg: #0A1128;
            --surface: #1E293B;
            --text: #F8FAFC;
            --accent: #55EFC4;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 { margin-top: 0; color: var(--accent); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }
        button {
            background-color: var(--surface);
            color: var(--text);
            border: 2px solid var(--accent);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background-color: var(--accent); color: var(--bg); }
        
        #prompter {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        
        #clock {
            font-size: 5rem;
            font-family: monospace;
            color: var(--text);
            opacity: 0.5;
            margin-bottom: 2rem;
        }
        
        #action-text {
            font-size: 6rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            line-height: 1.2;
            min-height: 200px;
        }

        #upcoming-text {
            margin-top: 2rem;
            font-size: 2rem;
            color: var(--warning);
            opacity: 0.8;
        }

        #setup-info {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            border-left: 5px solid var(--warning);
            text-align: left;
            max-width: 600px;
        }

        .countdown-mode #action-text { color: var(--warning); font-size: 10rem; }
        .flash-action { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); color: #fff; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>ClearVoicing Teleprompter</h1>
    <p style="font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.8;">Open this on your Desktop/Laptop. Tap a scenario, get your iPhone ready, and follow the giant instructions!</p>

    <div class="grid" id="menu">
        <button onclick="loadScenario('blob-test')">1. Blob Test</button>
        <button onclick="loadScenario('solo-voices')">2. Solo Voices</button>
        <button onclick="loadScenario('no-timer')">3. No Timer</button>
        <button onclick="loadScenario('follow-voice')">4. Follow Voice</button>
        <button onclick="loadScenario('three-presets')">5. Three Presets</button>
        <button onclick="loadScenario('full-demo')">6. Full Demo</button>
    </div>

    <div id="prompter">
        <div id="setup-info"></div>
        <div id="clock">00.0s</div>
        <div id="action-text">READY</div>
        <div id="upcoming-text"></div>
        
        <button onclick="closePrompter()" style="position: absolute; top: 2rem; right: 2rem; background: var(--danger); border: none; font-size: 0.9rem; padding: 0.8rem 1.2rem;">STOP / CANCEL</button>
    </div>

<script>
const SCENARIOS = {
    'blob-test': {
        setup: "Set Level: 2 (Seventh Chords)<br>Play Mode: Single Chord<br>Preset: Orchestra",
        timeline: [
            { time: 3000, action: "Tap PLAY \n▶" },
            { time: 10000, action: "Change Preset to\nClear Mix" },
            { time: 11000, action: "Tap PLAY \n▶" },
            { time: 18000, action: "Solo BASS" },
            { time: 20000, action: "Solo LEAD" },
            { time: 22000, action: "DE-SOLO LEAD" },
            { time: 22200, action: "DE-SOLO BASS" },
            { time: 24000, action: "Tap PLAY \n▶" },
            { time: 27000, action: "DONE! 🏁" }
        ]
    },
    'solo-voices': {
        setup: "Set Level: 2 (Seventh Chords)<br>Play Mode: Single Chord<br>Preset: Clear Mix",
        timeline: [
            { time: 3000, action: "Tap PLAY \n▶" },
            { time: 7000, action: "Solo BASS" },
            { time: 11000, action: "Solo 2nd VOICE" },
            { time: 15000, action: "Solo LEAD" },
            { time: 19000, action: "DE-SOLO LEAD" },
            { time: 20000, action: "Tap PLAY \n▶" },
            { time: 23000, action: "DONE! 🏁" }
        ]
    },
    'no-timer': {
        setup: "Set Level: 1 (Triads)<br>Play Mode: Single Chord<br>Preset: Clear Mix",
        timeline: [
            { time: 12000, action: "Tap PLAY \n▶" },
            { time: 15000, action: "Tap PLAY \n▶" },
            { time: 18000, action: "Tap PLAY \n▶" },
            { time: 20000, action: "Tap REVEAL CHORD" },
            { time: 25000, action: "Tap CORRECT ANSWER" },
            { time: 30000, action: "Tap REPLAY \n(Popup)" },
            { time: 33000, action: "Tap CONTINUE \n(Popup)" },
            { time: 35000, action: "DONE! 🏁" }
        ]
    },
    'follow-voice': {
        setup: "Set Level: 2 (Seventh Chords)<br>Play Mode: Progression<br>Preset: Clear Mix",
        timeline: [
            { time: 3000, action: "Tap PLAY \n▶" },
            { time: 10000, action: "Solo 2nd VOICE" },
            { time: 11000, action: "Tap PLAY \n▶" },
            { time: 15000, action: "DE-SOLO 2nd VOICE" },
            { time: 16000, action: "Solo LEAD" },
            { time: 17000, action: "Tap PLAY \n▶" },
            { time: 22000, action: "DE-SOLO LEAD" },
            { time: 23000, action: "Tap PLAY \n▶" },
            { time: 28000, action: "Tap PLAY \n▶" },
            { time: 32000, action: "DONE! 🏁" }
        ]
    },
    'three-presets': {
        setup: "Set Level: 2 (Seventh Chords)<br>Play Mode: Single Chord<br>Preset: Clear Mix",
        timeline: [
            { time: 3000, action: "Highlight Clear Mix" },
            { time: 4000, action: "Tap PLAY \n▶" },
            { time: 9000, action: "Change to JAZZ COMBO" },
            { time: 10000, action: "Tap PLAY \n▶" },
            { time: 15000, action: "Change to ORCHESTRA" },
            { time: 16000, action: "Tap PLAY \n▶" },
            { time: 20000, action: "DONE! 🏁" }
        ]
    },
    'full-demo': {
        setup: "Set Level: 1 (Triads)<br>Play Mode: Single Chord<br>Preset: Clear Mix<br>Session Size: 3",
        timeline: [
            { time: 0, action: "Tap PLAY \n▶" },
            { time: 5000, action: "Tap CORRECT ANSWER" },
            { time: 8000, action: "Tap CONTINUE" },
            { time: 12000, action: "Tap PLAY \n▶" },
            { time: 17000, action: "Tap CORRECT ANSWER" },
            { time: 20000, action: "Tap CONTINUE" },
            { time: 24000, action: "Tap PLAY \n▶" },
            { time: 29000, action: "Tap CORRECT ANSWER" },
            { time: 32000, action: "DONE! 🏁" }
        ]
    }
};

let currentRaf = null;
let startTime = 0;
let events = [];
let currentIndex = 0;

function loadScenario(id) {
    const sc = SCENARIOS[id];
    events = [...sc.timeline].sort((a,b) => a.time - b.time);
    currentIndex = 0;
    
    document.getElementById('setup-info').innerHTML = `<strong>SETUP APP FIRST:</strong><br>${sc.setup}`;
    document.getElementById('prompter').style.display = 'flex';
    document.getElementById('prompter').classList.add('countdown-mode');
    document.getElementById('clock').innerText = "PREPARE APP";
    
    // Countdown
    let left = 5;
    document.getElementById('action-text').innerText = left;
    document.getElementById('upcoming-text').innerText = "Start Screen Recording on iPhone now!";
    
    const intv = setInterval(() => {
        left--;
        if (left > 0) {
            document.getElementById('action-text').innerText = left;
        } else {
            clearInterval(intv);
            document.getElementById('prompter').classList.remove('countdown-mode');
            startEngine();
        }
    }, 1000);
}

function startEngine() {
    startTime = performance.now();
    updateUI();
    tick();
}

function tick() {
    const elapsed = performance.now() - startTime;
    document.getElementById('clock').innerText = (elapsed / 1000).toFixed(1) + "s";
    
    // Check if we hit the next event
    if (currentIndex < events.length) {
        if (elapsed >= events[currentIndex].time) {
            triggerEvent(events[currentIndex]);
            currentIndex++;
            updateUI();
        }
    }
    
    currentRaf = requestAnimationFrame(tick);
}

function triggerEvent(ev) {
    const el = document.getElementById('action-text');
    el.innerText = ev.action;
    
    // Flash animation to grab eye attention
    el.classList.remove('flash-action');
    void el.offsetWidth;
    el.classList.add('flash-action');
    
    // Beep sound to help sync looking at screen vs phone
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.frequency.value = ev.action.includes("DONE") ? 400 : 800; // Lower pitch for done
        g.gain.value = 0.1;
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
        setTimeout(() => osc.stop(), 100);
    } catch(e){}
}

function updateUI() {
    if (currentIndex < events.length) {
        const next = events[currentIndex];
        document.getElementById('upcoming-text').innerText = `Next: ${next.action.replace('\n',' ')} (in ${((next.time - (performance.now() - startTime))/1000).toFixed(1)}s)`;
    } else {
        document.getElementById('upcoming-text').innerText = "";
    }
}

function closePrompter() {
    document.getElementById('prompter').style.display = 'none';
    cancelAnimationFrame(currentRaf);
}
</script>
</body>
</html>
