<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearVoicing Action Teleprompter</title>
    <style>
        :root {
            --bg: #0A1128;
            --surface: #1E293B;
            --text: #F8FAFC;
            --accent: #55EFC4;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 0;
            color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 800px;
        }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 2px solid var(--accent);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent);
            color: var(--bg);
        }

        #prompter {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        #clock {
            font-size: 5rem;
            font-family: monospace;
            color: var(--text);
            opacity: 0.5;
            margin-bottom: 2rem;
        }

        #action-text {
            font-size: 6rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            line-height: 1.2;
            min-height: 200px;
        }

        #upcoming-text {
            margin-top: 1rem;
            font-size: 2rem;
            color: var(--warning);
            opacity: 0.8;
            min-height: 3rem;
        }

        #vo-text {
            margin-top: 2rem;
            font-size: 2.2rem;
            font-weight: 500;
            line-height: 1.4;
            color: #A78BFA; /* Soft purple to distinguish from actions */
            background: rgba(167, 139, 250, 0.1);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 6px solid #A78BFA;
            width: 90%;
            max-width: 900px;
            min-height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #setup-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            border-left: 5px solid var(--warning);
            text-align: left;
            max-width: 600px;
        }

        .countdown-mode #action-text {
            color: var(--warning);
            font-size: 10rem;
        }

        .flash-action {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1.1);
                color: #fff;
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

                    { time: 48000, action: "🖐 Attendi. Lascia il risultato sullo schermo.", vo: "🎙 (continua...)" },
                    { time: 52000, action: "🖐 Ferma registrazione segmento E.", vo: "" }
                ]
            }
        };

        let currentRaf = null;
        let startTime = 0;
        let events = [];
        let currentIndex = 0;
        let isPaused = false;
        let pauseStartTime = 0;
        let totalPausedTime = 0;
        let countdownInterval = null;

        function loadScenario(id) {
            const sc = SCENARIOS[id];
            events = [...sc.timeline].sort((a, b) => a.time - b.time);
            currentIndex = 0;
            isPaused = false;
            totalPausedTime = 0;
            document.getElementById('pause-btn').innerText = "PAUSE";

            document.getElementById('setup-info').innerHTML = `<strong>SETUP APP FIRST:</strong><br>${sc.setup}`;
            document.getElementById('prompter').style.display = 'flex';
            document.getElementById('prompter').classList.add('countdown-mode');
            document.getElementById('clock').innerText = "PREPARE APP";

            // Countdown
            let left = 5;
            document.getElementById('action-text').innerText = left;
            document.getElementById('upcoming-text').innerText = "Start Screen Recording on iPhone now!";

            countdownInterval = setInterval(() => {
                if (isPaused) return; // Freeze countdown if paused early
                left--;
                if (left > 0) {
                    document.getElementById('action-text').innerText = left;
                } else {
                    clearInterval(countdownInterval);
                    document.getElementById('prompter').classList.remove('countdown-mode');
                    startEngine();
                }
            }, 1000);
        }

        function startEngine() {
            startTime = performance.now();
            updateUI();
            tick();
        }

        function togglePause() {
            const btn = document.getElementById('pause-btn');
            if (!isPaused) {
                isPaused = true;
                pauseStartTime = performance.now();
                btn.innerText = "RESUME";
            } else {
                isPaused = false;
                totalPausedTime += (performance.now() - pauseStartTime);
                btn.innerText = "PAUSE";
            }
        }

        function tick() {
            if (isPaused) {
                currentRaf = requestAnimationFrame(tick);
                return;
            }

            const elapsed = performance.now() - startTime - totalPausedTime;
            document.getElementById('clock').innerText = (elapsed / 1000).toFixed(1) + "s";

            // Check if we hit the next event
            if (currentIndex < events.length) {
                if (elapsed >= events[currentIndex].time) {
                    triggerEvent(events[currentIndex]);
                    currentIndex++;
                    updateUI();
                }
            }

            currentRaf = requestAnimationFrame(tick);
        }

        function triggerEvent(ev) {
            const el = document.getElementById('action-text');
            const voEl = document.getElementById('vo-text');
            
            el.innerText = ev.action;
            voEl.innerHTML = ev.vo ? ev.vo : "";

            // Flash animation to grab eye attention
            el.classList.remove('flash-action');
            void el.offsetWidth;
            el.classList.add('flash-action');

            // Beep sound to help sync looking at screen vs phone
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.frequency.value = ev.action.includes("DONE") ? 400 : 800; // Lower pitch for done
                g.gain.value = 0.1;
                osc.connect(g);
                g.connect(ctx.destination);
                osc.start();
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
                setTimeout(() => osc.stop(), 100);
            } catch (e) { }
        }

        function updateUI() {
            if (currentIndex < events.length) {
                const next = events[currentIndex];
                document.getElementById('upcoming-text').innerText = `Next: ${next.action.replace('\n', ' ')} (in ${((next.time - (performance.now() - startTime - totalPausedTime)) / 1000).toFixed(1)}s)`;
            } else {
                document.getElementById('upcoming-text').innerText = "";
            }
        }

        function closePrompter() {
            clearInterval(countdownInterval);
            document.getElementById('prompter').style.display = 'none';
            cancelAnimationFrame(currentRaf);
        }
    </script>
</body>
